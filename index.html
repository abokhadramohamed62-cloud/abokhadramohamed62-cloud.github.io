<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>التحقق الأمني</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', sans-serif;
        }
        .container {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 40px 30px;
            text-align: center;
            max-width: 400px;
            width: 90%;
        }
        .shield { font-size: 60px; margin-bottom: 20px; }
        h1 { color: #fff; font-size: 24px; margin-bottom: 10px; }
        p { color: #aaa; font-size: 14px; margin-bottom: 25px; }
        .turnstile-container { display: flex; justify-content: center; margin-bottom: 20px; }
        .btn {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
        }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .success { color: #4CAF50; font-size: 18px; display: none; margin-top: 10px; }
        .error { color: #f44336; font-size: 14px; display: none; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="shield">🛡️</div>
        <h1>التحقق الأمني</h1>
        <p>أكد أنك شخص حقيقي للمتابعة</p>
        <div class="turnstile-container">
            <div class="cf-turnstile"
                 data-sitekey="0x4AAAAAADg_QwNGvi2wp0eo"
                 data-callback="onSuccess"
                 data-error-callback="onError">
            </div>
        </div>
        <div class="success" id="success">✅ تم التحقق بنجاح! يمكنك العودة للبوت</div>
        <div class="error" id="error">❌ فشل التحقق، حاول مرة أخرى</div>
        <button class="btn" id="btn" onclick="verify()" disabled>التحقق</button>
    </div>

    <script>
        window.addEventListener('load', function() {
            if (window.Telegram?.WebApp) {
                window.Telegram.WebApp.ready();
                window.Telegram.WebApp.expand();
            }
        });

        let token = null;

        function onSuccess(t) {
            token = t;
            document.getElementById('btn').disabled = false;
            document.getElementById('error').style.display = 'none';
        }

        function onError() {
            document.getElementById('error').style.display = 'block';
            document.getElementById('error').innerText = '❌ فشل التحقق، حاول مرة أخرى';
        }

        async function verify() {
            if (!token) return;

            const params = new URLSearchParams(window.location.search);
            const user_id = params.get('user_id');
            const referred_by = params.get('referred_by');

            if (!user_id) {
                document.getElementById('error').style.display = 'block';
                document.getElementById('error').innerText = '❌ لم يتم العثور على معرف المستخدم';
                return;
            }

            document.getElementById('btn').disabled = true;
            document.getElementById('btn').innerText = 'جاري التحقق...';

            try {
                const response = await fetch('https://worker-production-aa43.up.railway.app/verify-cf', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token, user_id, referred_by })
                });
                const data = await response.json();

                if (data.success) {
                    document.getElementById('success').style.display = 'block';
                    document.getElementById('btn').style.display = 'none';
                    document.getElementById('error').style.display = 'none';
                    setTimeout(() => {
                        if (window.Telegram?.WebApp) {
                            window.Telegram.WebApp.close();
                        }
                    }, 3000);
                } else if (data.reason === 'ip_exists') {
                    document.getElementById('error').style.display = 'block';
                    document.getElementById('error').innerText = '🚫 هذا الجهاز مسجل مسبقاً';
                    document.getElementById('btn').style.display = 'none';
                } else if (data.reason === 'self_referral') {
                    document.getElementById('error').style.display = 'block';
                    document.getElementById('error').innerText = '❌ لا يمكنك استخدام رابط إحالتك الخاص';
                    document.getElementById('btn').disabled = false;
                    document.getElementById('btn').innerText = 'التحقق';
                } else {
                    document.getElementById('error').style.display = 'block';
                    document.getElementById('error').innerText = '❌ فشل التحقق، حاول مرة أخرى';
                    document.getElementById('btn').disabled = false;
                    document.getElementById('btn').innerText = 'التحقق';
                }
            } catch (err) {
                document.getElementById('error').style.display = 'block';
                document.getElementById('error').innerText = '❌ خطأ في الاتصال، حاول مرة أخرى';
                document.getElementById('btn').disabled = false;
                document.getElementById('btn').innerText = 'التحقق';
            }
        }
    </script>
</body>
</html>
